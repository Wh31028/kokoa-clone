<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="css/style.css" />
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Friends - Kokoa Clone</title>
  </head>
  <body>
    <div class="status-bar">
      <div class="status-bar__column">
        <span>No Service</span>
        <i class="fa-solid fa-wifi"></i>
        <!--To do: wifi Icon-->
      </div>
      <div class="status-bar__column">
        <span>18:43</span>
      </div>
      <div class="status-bar__column">
        <span>110%</span>
        <i class="fa-solid fa-battery-full"></i>
        <i class="fa-sharp fa-solid fa-bolt fa-lg"></i>
        <!--Battery Icon-->
        <!--Lightning Icon-->
      </div>
    </div>

    <header class="screen-header">
        <h1 class="screen-header__title">Friends</h1>
        <div class="screen-header__icons">
            <span><i class="fa fa-magnifying-glass fa-1x"></i></span>
            <span><i class="fa-solid fa-music fa-1x"></i></span>
            <span><i class="fa-solid fa-gear fa-1x"></i></span>
        </div>
    </header>
    
    <a id="friends-display-link">
        <i class="fa-solid fa-circle-info"></i>Friends' Names Display<i class="fa-solid fa-chevron-right fa-xs"></i>
    </a>

    <main class="friends-screen">
        <div class="user-component">
            <div class="user-component__colum">
                <img src="https://avatars.githubusercontent.com/u/3612017?v=4" class="user-component__avater user-component__avater--xl">
                <div class="user-component__text">
                    <h4 class="user-component__title">Nicolas</h4>
                    <!--<h6 class="user-component__subtitle">this text whatever</h6>-->
                </div>
            </div>
            <div class="user-component__colum"></div>
        </div>
        <div class="friends-screen__channel">
            <div class="friends-screen__channel-header">
                <span>Channel</span>
                <i class="fa-solid fa-chevron-up fa-xs"></i>
            </div>
            <div class="user-component">
                <div class="user-component__colum">
                    <img src="https://avatars.githubusercontent.com/u/3612017?v=4" class="user-component__avater user-component__avater--sm">
                    <div class="user-component__text">
                        <h4 class="user-component__title user-component__title--not-bold">Channel</h4>
                    </div>
                </div>
                <div class="user-component">
                    <div class="user-component__colum">
                            <span>2</span>
                           <i class="fa-solid fa-chevron-right fa-xs"></i>
                    </div> 
                </div>
            </div>
            
    </main>
   

    <nav class="nav"> <!--  nav>li>li*4>a   -->
        <ul class="nav__list">
            <li class="nav__btn"><a class="nav__link" href="friends.html"><i class="fas fa-user fa-2x"></i></a></li>
            <li class="nav__btn"><a class="nav__link" href="#"><span class="nav__notification">1</span><i class="far fa-comment fa-2x"></i></a></li>
            <li class="nav__btn"><a class="nav__link" href="#"><i class="fa fa-magnifying-glass fa-2x"></i></a></li>
            <li class="nav__btn"><a class="nav__link" href="#"><span class="nav__notification2"></span><i class="fas fa-ellipsis fa-2x"></i></a></li>
        </ul>
    </nav>
    <script
      src="https://kit.fontawesome.com/a408224058.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
